name: CI

on:
  push:
  pull_request:

jobs:
  rust-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run Clippy (WASM target)
        run: cargo clippy --target wasm32-unknown-unknown -p taxvault-wasm -- -D warnings

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Run cargo audit
        run: cargo audit

      - name: Run tests
        run: cargo test --workspace

      - name: Run verification script unit tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'

      - name: Check web app JavaScript syntax
        run: node --check web/app.js

      - name: Verify embedded tax table rows
        run: python3 scripts/verify_tax_table.py --check

  web-smoke-safari:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Enable Safari remote automation
        run: sudo safaridriver --enable

      - name: Build web bundle
        working-directory: crates/taxvault-wasm
        run: wasm-pack build --target web --out-dir ../../web/pkg --release

      - name: Run Safari smoke tests
        run: python3 tests/web_smoke.py
