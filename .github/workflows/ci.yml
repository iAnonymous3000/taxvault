name: CI

on:
  push:
  pull_request:

jobs:
  rust-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run Clippy (WASM target)
        run: cargo clippy --target wasm32-unknown-unknown -p taxvault-wasm -- -D warnings

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Run cargo audit
        run: cargo audit

      - name: Run tests
        run: cargo test --workspace

      - name: Run verification script unit tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'

      - name: Check web app JavaScript syntax
        run: npm run check:web-js

      - name: Verify embedded tax table rows
        run: python3 scripts/verify_tax_table.py --check

  web-smoke-playwright:
    runs-on: ubuntu-latest
    needs: rust-checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install web test dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build web bundle
        working-directory: crates/taxvault-wasm
        run: wasm-pack build --target web --out-dir ../../web/pkg --release

      - name: Run Playwright smoke tests
        run: npm run test:web-smoke
