name: Deploy Pages

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dispatched ref
        uses: actions/checkout@v6
        if: github.event_name == 'workflow_dispatch'

      - name: Checkout CI commit
        uses: actions/checkout@v6
        if: github.event_name == 'workflow_run'
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Confirm public release tax-table gate
        run: python3 scripts/verify_tax_table.py --report --check --require-public-release-ready

      - name: Install wasm-pack
        run: cargo install --locked wasm-pack

      - name: Build web pkg
        working-directory: crates/taxvault-wasm
        run: wasm-pack build --target web --out-dir ../../web/pkg --release

      - name: Check web app JavaScript syntax
        run: npm run check:web-js

      - name: Disable Jekyll
        run: touch web/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
